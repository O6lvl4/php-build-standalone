name: build-all

on:
  workflow_dispatch:
  schedule:
    # Weekly: check for new PHP releases and rebuild
    - cron: "0 6 * * 1"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: dispatch builds for new versions
    runs-on: ubuntu-latest
    steps:
      - name: resolve and dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          dispatched=0
          for branch in 8.2 8.3 8.4; do
            ver=$(curl -fsSL "https://www.php.net/releases/index.php?json&version=${branch}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null || true)
            if [ -z "$ver" ]; then
              echo "⚠ Could not resolve latest for PHP ${branch}"
              continue
            fi
            if gh release view "php-${ver}" --repo "$repo" >/dev/null 2>&1; then
              echo "✓ php-${ver} already released, skipping"
              continue
            fi
            echo "→ Dispatching build for PHP ${ver}"
            gh workflow run build.yml --repo "$repo" --field "php_version=${ver}"
            dispatched=$((dispatched + 1))
            sleep 5
          done
          echo "Dispatched ${dispatched} build(s)"
